<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>asuphoto — 空き状況</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,'Hiragino Sans',sans-serif;background:#FBF7F4;color:#1A0F0A;font-size:15px;line-height:1.6}
.site-header{background:#C4A882;color:#fff;padding:1.5rem;text-align:center}
.site-header h1{font-size:20px;font-weight:500;margin-bottom:2px}
.site-header p{font-size:13px;opacity:.85}
.container{max-width:480px;margin:0 auto;padding:1.5rem 1rem}
.card{background:#fff;border-radius:12px;border:0.5px solid #E8DDD7;padding:1.5rem;margin-bottom:1.25rem}
.card h2{font-size:15px;font-weight:500;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.card h2::before{content:'';display:block;width:4px;height:16px;background:#8B6244;border-radius:2px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-nav button{background:#F9F5F1;border:0.5px solid #E8DDD7;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:14px}
.cal-nav span{font-size:14px;font-weight:500}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{text-align:center;font-size:11px;color:#888;padding:4px 0;font-weight:500}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;border-radius:8px;border:0.5px solid transparent}
.cal-cell.empty,.cal-cell.past{color:#ccc}
.cal-cell.available.partial-booked{background:#FCEEDC;color:#A35E0A}
.cal-cell.available{background:#EAF3DE;color:#27500A}
.cal-cell .mark{font-size:10px;font-weight:500}
.legend{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#666}
.legend-dot{width:10px;height:10px;border-radius:50%}
.loading{text-align:center;padding:1rem;font-size:13px;color:#888}
.cal-cell.available{cursor:pointer}
.cal-cell.available:hover{opacity:.8}
.cal-cell.selected{background:#8B6244;color:#fff;font-weight:500;cursor:pointer}
.time-panel{margin-top:1rem;background:#F9F5F1;border-radius:10px;padding:1rem;display:none}
.time-panel.show{display:block}
.time-panel h3{font-size:13px;font-weight:500;margin-bottom:8px;color:#3D2B1F}
.time-slots{display:flex;flex-wrap:wrap;gap:6px}
.time-slot{padding:6px 12px;border-radius:6px;font-size:13px;background:#EAF3DE;color:#27500A;border:0.5px solid #97C459}
</style>
</head>
<body>
<header class="site-header">
  <h1>asuphoto</h1>
  <p>空き状況</p>
</header>
<div class="container">
  <div class="card">
    <h2>空き日程</h2>
    <div id="cal-loading" class="loading">読み込み中...</div>
    <div id="cal-body" style="display:none">
      <div class="cal-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <span id="cal-month-label"></span>
        <button onclick="changeMonth(1)">›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#97C459"></div>空きあり</div>
      </div>空き</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ddd"></div>予約不可日</div>
      </div>
      <div class="time-panel" id="time-panel">
        <h3 id="time-panel-title">空き時間</h3>
        <div class="time-slots" id="time-slots"></div>
      </div>
    </div>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxV03iKnfqUEmQzqa_xkAhBNNYxsvyT-wtkM_6pG6HDPk6xbq2Uo3f7Np4olgm2QoT1Zw/exec';
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let availability = {};
let selectedDate = '';
const DJ = ['日','月','火','水','木','金','土'];
const MJ = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function fetchAvailability() {
  const cb = 'availCb_' + Date.now();
  window[cb] = function(json) {
    if (json.status === 'ok') availability = json.availability || {};
    document.getElementById('cal-loading').style.display = 'none';
    document.getElementById('cal-body').style.display = 'block';
    buildCalendar();
    delete window[cb];
    const s = document.getElementById(cb); if(s) s.remove();
  };
  const script = document.createElement('script');
  script.id = cb;
  script.src = APPS_SCRIPT_URL + '?action=availability&callback=' + cb + '&t=' + Date.now();
  script.onerror = function() {
    document.getElementById('cal-loading').style.display = 'none';
    document.getElementById('cal-body').style.display = 'block';
    buildCalendar();
    delete window[cb]; script.remove();
  };
  document.head.appendChild(script);
}

function buildCalendar() {
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  DJ.forEach(d => { const e=document.createElement('div'); e.className='cal-day'; e.textContent=d; grid.appendChild(e); });
  const first = new Date(calYear,calMonth,1).getDay();
  const total = new Date(calYear,calMonth+1,0).getDate();
  const today = new Date();
  document.getElementById('cal-month-label').textContent = calYear + '年 ' + MJ[calMonth];
  for(let i=0;i<first;i++){const e=document.createElement('div');e.className='cal-cell empty';grid.appendChild(e);}
  for(let d=1;d<=total;d++){
    const key = calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const el = document.createElement('div');
    const numEl = document.createElement('span'); numEl.textContent = d; el.appendChild(numEl);
    const isPast = new Date(calYear,calMonth,d) < new Date(today.getFullYear(),today.getMonth(),today.getDate());
    const availSlots = Object.keys(availability).filter(k=>k.startsWith(key+' ')&&availability[k]==='available');
    if(isPast){
      el.className='cal-cell past';
    } else if(key===selectedDate){
      el.className='cal-cell selected';
      const mark=document.createElement('span');mark.className='mark';mark.textContent='✓';el.appendChild(mark);
      el.onclick=()=>{selectedDate='';buildCalendar();showTimeSlots && showTimeSlots('');};
    } else if(availability[key]==='available'||availSlots.length>0){
      const totalSlots = Object.keys(availability).filter(k=>k.startsWith(key+' ')).length;
      const bookedSlots = Object.keys(availability).filter(k=>k.startsWith(key+' ')&&availability[k]==='booked').length;
      el.className='cal-cell available'+(bookedSlots>0?' partial-booked':'');
      const mark=document.createElement('span');mark.className='mark';
      mark.textContent = bookedSlots > 0 ? '▲' : '○';el.appendChild(mark);
      el.onclick=()=>{selectedDate=key;buildCalendar();showTimeSlots && showTimeSlots(key);};
    } else {
      el.className='cal-cell past';
    }
    grid.appendChild(el);
  }
}

function changeMonth(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  buildCalendar();
}

fetchAvailability();

function showTimeSlots(key) {
  const panel = document.getElementById('time-panel');
  const title = document.getElementById('time-panel-title');
  const slotsEl = document.getElementById('time-slots');
  if (!key) { panel.classList.remove('show'); return; }

  // 時間スロットを取得
  const daySlots = Object.keys(availability)
    .filter(k => k.startsWith(key + ' ') && availability[k] === 'available')
    .map(k => k.replace(key + ' ', ''))
    .sort();

  title.textContent = key + ' の空き時間';
  panel.classList.add('show');

  if (daySlots.length > 0) {
    slotsEl.innerHTML = daySlots.map(h =>
      '<div class="time-slot">' + h + '</div>'
    ).join('');
  } else if (availability[key] === 'available') {
    slotsEl.innerHTML = '<div class="time-slot">終日</div>';
  } else {
    slotsEl.innerHTML = '<p style="font-size:13px;color:#888">時間帯の指定なし（終日空き）</p>';
  }
}
</script>
</body>
</html>
